# Lives in: config-docker repo at  .github/workflows/deploy-backend.yml
#
# The "worker": reproduces `make fetch-sources` + `docker build` in CI, then
# pings Render to redeploy. All deployment knowledge lives HERE, in your
# Docker warline repo. Your existing backend/Dockerfile is used unchanged.

name: Build and deploy backend

on:
  repository_dispatch:
    types: [config-man-updated]   # fired by config-man's doorbell
  workflow_dispatch:              # manual "Run workflow" button as fallback

permissions:
  contents: read
  packages: write                 # push to ghcr.io/cnd-final/*

env:
  IMAGE: ghcr.io/cnd-final/config-man-backend

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout config-docker (Dockerfile lives here)
        uses: actions/checkout@v4

      - name: Checkout config-man main into base/config-man
        uses: actions/checkout@v4
        with:
          repository: CND-final/config-man
          ref: main
          path: base/config-man    # exactly where `make fetch-sources` puts it

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64   # Render runs amd64 — pin it, never arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ github.event.client_payload.sha || github.sha }}

      - name: Trigger Render redeploy
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: curl -fsS -X POST "$HOOK"

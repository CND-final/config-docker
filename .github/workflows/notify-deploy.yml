# Lives in: config-man repo at  .github/workflows/notify-deploy.yml
#
# The "doorbell": when backend code lands on main, ping config-docker to
# rebuild + redeploy the backend image. Holds NO deployment detail — no
# Dockerfile, no image name, no Render hook. Just a notification.

name: Notify config-docker to deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'        # only backend changes affect the image / schema
      # frontend is a Render Static Site that auto-deploys on its own.

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch event to config-docker
        env:
          DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer $DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/CND-final/config-docker/dispatches \
            -d '{"event_type":"config-man-updated","client_payload":{"sha":"${{ github.sha }}"}}'

# Full-stack Docker Compose (build from source) for config-man
# Services: postgres → backend → frontend (nginx)
#
# Usage (from project root):
#   make up-build   fetch config-man source, build images, start all services
#   make down       stop all services (data volume is preserved)
#
# Each service reads its env vars from config/<service>.env.
# Copy the corresponding .env.example files before first run:
#   copy config\postgres.env.example config\postgres.env
#   copy config\backend.env.example  config\backend.env
#   copy config\frontend.env.example config\frontend.env
#
# Build context is the repo root; source code is expected at base/config-man/.
# Run `make fetch-sources` (or `make build`) to clone/update config-man first.

services:

  postgres:
    image: postgres:16-alpine
    container_name: config-man-postgres
    env_file: config/postgres.env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - config_man_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - config-man-net

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: config-man-backend
    env_file: config/backend.env
    environment:
      # DATABASE_URL contains the Docker service name "postgres" — kept here
      # so teammates cannot accidentally override it with a localhost URL.
      DATABASE_URL: ${DATABASE_URL:-postgres://config_man:config_man@postgres:5432/config_man?sslmode=disable}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - config-man-net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: config-man-frontend
    env_file: config/frontend.env
    ports:
      - "${FRONTEND_PORT:-80}:80"
      # - "443:443"  # For HTTPS: uncomment after configuring SSL in frontend/nginx.conf
    # For HTTPS: uncomment to mount SSL certificates into nginx.
    # volumes:
    #   - ./certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - config-man-net

networks:
  config-man-net:
    driver: bridge

volumes:
  config_man_postgres:

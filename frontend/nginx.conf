server {
    listen 80;
    server_name _;

    # ── Future HTTPS ─────────────────────────────────────────────────────────
    # To enable HTTPS, uncomment and configure the block below.
    # You will also need to:
    #   1. Mount certificate files into the container (see docker-compose.yml volumes comment).
    #   2. Uncomment "443:443" in docker-compose.yml ports.
    #   3. Add an HTTP→HTTPS redirect server block (see docs/DOCKER.md).
    #
    # listen 443 ssl;
    # ssl_certificate     /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;
    # ─────────────────────────────────────────────────────────────────────────

    root  /usr/share/nginx/html;
    index index.html;

    # API proxy to backend service.
    # No trailing slash on proxy_pass: nginx preserves the full /api/v1/... path.
    location /api {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # SPA fallback: unknown paths return index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

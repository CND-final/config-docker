server {
    listen 80;
    server_name _;

    # TLS is terminated at the reverse proxy container.
    # Keep the frontend on plain HTTP behind the proxy.

    root  /usr/share/nginx/html;
    index index.html;

    # API proxy to backend service.
    # No trailing slash on proxy_pass: nginx preserves the full /api/v1/... path.
    location /api {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # SPA fallback: unknown paths return index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
